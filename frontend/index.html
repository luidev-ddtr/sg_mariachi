<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mariachis San Nicolás</title>
  <link rel="icon" href="/images/logo_cn_fondo.png" type="image/png">
  <!-- Fuente de íconos de Google -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="/src/styles/style_index.css">

  <style>
    body {
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.4s ease-in;
    }
    body.visible {
      visibility: visible;
      opacity: 1;
    }
    #toggleSidebarMobile {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      background: #fff;
      border: 1px solid #ddd;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      z-index: 1100;
      align-items: center;
      justify-content: center;
    }
    #toggleSidebarMobile .material-symbols-outlined {
      font-size: 26px;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <button id="toggleSidebarMobile">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <aside class="sidebar">

    <div class="sidebar-header">

      <button id="toggleSidebar" class="toggle-sidebar">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <div class="logo-container">
        <img src="images/logo_cn_fondo.png" alt="Logo Mariachis" class="logo">
      </div>

    </div>

    <div class="sidebar-top">
      <nav class="menu">

        <a href="/pages/control_panel.html" target="contenido" class="menu-item" data-tooltip="Panel de control">
          <span class="material-symbols-outlined">bar_chart</span>
          <span class="text_nav">Panel de control</span>
        </a>

        <a href="/pages/agenda.html" target="contenido" class="menu-item" data-tooltip="Agenda">
          <span class="material-symbols-outlined">event</span>
          <span class="text_nav">Agenda</span>
        </a>

        <a href="/pages/registro-evento.html" target="contenido" class="menu-item" data-tooltip="Eventos">
          <span class="material-symbols-outlined">assignment</span>
          <span class="text_nav">Eventos</span>
        </a>

        <a href="/pages/generate_reports.html" target="contenido" class="menu-item" data-tooltip="Reportes">
          <span class="material-symbols-outlined">person</span>
          <span class="text_nav">Administrador</span>
        </a>

      </nav>
    </div>

    <div class="sidebar-bottom">
      <a href="#" id="logoutBtn" class="logout-btn">
        <span class="material-symbols-outlined">logout</span>
        <span class="logout-label">Salir</span>
      </a>
    </div>

  </aside>

  <main class="main-content">
    <iframe name="contenido" src="/pages/control_panel.html" class="iframe-content"></iframe>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script type="module">
    import { checkSession, logoutUser } from './src/api/api_auth.js';

    document.addEventListener('DOMContentLoaded', async () => {
     // 1. PROTECCIÓN: Verificar si hay sesión activa al entrar
      const session = await checkSession();
      // Si no hay sesión o el status no es success/200, expulsamos al usuario
      if (!session || (session.status !== 'success' && session.status !== 200)) {
        window.location.replace('/pages/login.html');  // Usamos 'replace' para que no puedan volver atrás con el botón del navegador
        return;
      }

      // 2. CONTROL DE PERMISOS: Ocultar opciones según el rol
      // Usamos DIM_Position que es el campo que viene de tu DB
      const userRole = session.body.DIM_Position || 'Administrador'; 
      if (userRole !== 'Administrador principal'&& userRole !== 'Administrador') {
        const adminLink = document.querySelector('a[href="/pages/generate_reports.html"]');
        if (adminLink) {
          adminLink.style.display = 'none';
        }
      }

      console.log(userRole);

      // 3. Si llegamos aquí, hay sesión. Mostramos el dashboard.
      document.body.classList.add('visible');
      // 4. FUNCIONALIDAD LOGOUT: Conectar el botón con la API
      const btnLogout = document.getElementById('logoutBtn');
      if (btnLogout) {
        btnLogout.addEventListener('click', async (e) => {
          e.preventDefault();  // Evita que el enlace navegue por sí solo
          await logoutUser();  // Llama al backend para destruir la sesión y redirige
        });
      }

      /* CONTROL SIDEBAR */

      const toggleBtn       = document.getElementById('toggleSidebar');
      const toggleBtnMobile = document.getElementById('toggleSidebarMobile');
      const sidebar         = document.querySelector('.sidebar');
      const mainContent     = document.querySelector('.main-content');
      const overlay         = document.getElementById('sidebarOverlay');

      function initSidebar() {
        sidebar.classList.remove('sidebar-visible');
        overlay.classList.remove('active');
      }

      toggleBtn.addEventListener('click', () => {
        const isCollapsed = sidebar.classList.contains('sidebar-collapsed');

        sidebar.classList.toggle('sidebar-collapsed', !isCollapsed);
        mainContent.classList.toggle('main-collapsed', !isCollapsed);
      });

      toggleBtnMobile.addEventListener('click', () => {
        const isVisible = sidebar.classList.contains('sidebar-visible');

        sidebar.classList.toggle('sidebar-visible', !isVisible);
        overlay.classList.toggle('active', !isVisible);
      });

      overlay.addEventListener('click', () => {
        sidebar.classList.remove('sidebar-visible');
        overlay.classList.remove('active');
      });

      window.addEventListener('resize', () => {
        overlay.classList.remove('active');

        if (window.innerWidth > 600) {
          sidebar.classList.remove('sidebar-visible');
        }
      });

      initSidebar();
    });
  </script>

</body>
</html>
